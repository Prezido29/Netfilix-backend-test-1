name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:

      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 (used for running tests before Docker build)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Cache Maven dependencies to speed up future runs
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Step 4: Run tests before building the Docker image
      - name: Run tests
        run: mvn test -B

      # Step 5: Set up Docker Buildx (enables advanced build features and caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6: Log in to Docker Hub using secrets stored in GitHub
      # Go to: Settings → Secrets and variables → Actions → New repository secret
      # Add: DOCKER_USERNAME and DOCKER_PASSWORD (use an Access Token, not your password)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: sirecloud
          password: DOCKER_HUB_TOKEN

      # Step 7: Extract metadata to auto-generate image tags
      # This produces tags like: latest, and a SHA-based tag for traceability
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sirecloud/myapp
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      # Step 8: Build and push the multi-stage Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache: avoids rebuilding unchanged layers on every run
          cache-from: type=gha
          cache-to: type=gha,mode=max